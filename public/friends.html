<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - LangZy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="flex-between mb-2" style="align-items: center; padding: 20px 0;">
            <div class="flex gap-2" style="align-items: center;">
                <button class="btn btn-secondary" onclick="window.history.back()" title="Go Back">
                    ← Back
                </button>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img src="assets/logo.png" alt="LangZy Logo"
                        style="width: 42px; height: 42px; object-fit: contain; border-radius: 50%; border: 2px solid var(--emerald-light);">
                    <h2
                        style="margin: 0; background: linear-gradient(135deg, #34D399, #10B981); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; font-weight: 800; letter-spacing: -1px;">
                        LangZy</h2>
                </div>
            </div>
            <div class="flex gap-2" style="align-items: center;">
                <span class="header-profile-name"
                    style="color: var(--text-main); font-weight: 600; margin-right: 8px; display: none;">User</span>
                <label class="theme-switch" title="Toggle Light/Dark Mode" style="margin-right: 12px;">
                    <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                    <span class="theme-slider"></span>
                </label>
                <button class="btn btn-secondary" onclick="window.location.href='home.html'">
                    🏠 Home
                </button>
            </div>
        </div>
    </div>

    <!-- Language Cycling Marquee -->
    <div id="langMarqueeMount"></div>

    <div class="container" style="padding-top: 40px;">
        <div class="flex-between mb-3">
            <div>
                <h1 style="font-size: 36px; margin-top: 16px;">👥 Friends</h1>
                <p class="text-muted">Connect and compete with friends</p>
            </div>
            <button class="btn btn-primary" onclick="showAddFriendModal()">+ Add Friend</button>
        </div>

        <!-- Stats -->
        <div class="grid-3 mb-3">
            <div class="card text-center">
                <h3 style="color: var(--purple); font-size: 32px;" id="friendsCount">0</h3>
                <p class="text-muted">Friends</p>
            </div>
            <div class="card text-center">
                <h3 style="color: var(--orange); font-size: 32px;" id="pendingCount">0</h3>
                <p class="text-muted">Pending Requests</p>
            </div>
            <div class="card text-center">
                <h3 style="color: var(--green); font-size: 32px;" id="activeCount">0</h3>
                <p class="text-muted">Active Today</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="card mb-3">
            <div class="flex gap-2">
                <button class="btn btn-primary" onclick="switchTab('all')" id="tabAll">All Friends</button>
                <button class="btn btn-secondary" onclick="switchTab('pending')" id="tabPending">Pending
                    Requests</button>
            </div>
        </div>

        <!-- Friends List -->
        <div id="friendsList">
            <!-- Friends will load here -->
        </div>
    </div>

    <script src="app.js"></script>
    <script src="js/marquee.js"></script>
    <script src="js/friends.js"></script>
</body>

</html>
