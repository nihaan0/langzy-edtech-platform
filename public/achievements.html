<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - LangZy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="flex-between mb-2" style="align-items: center; padding: 20px 0;">
            <div class="flex gap-2" style="align-items: center;">
                <button class="btn btn-secondary" onclick="window.history.back()" title="Go Back">
                    ← Back
                </button>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img src="assets/logo.png" alt="LangZy Logo"
                        style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--emerald-light);">
                    <h2
                        style="margin: 0; background: linear-gradient(135deg, #34D399, #10B981); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; font-weight: 800; letter-spacing: -1px;">
                        LangZy</h2>
                </div>
            </div>
            <div class="flex gap-2" style="align-items: center;">
                <span class="header-profile-name"
                    style="color: var(--text-main); font-weight: 600; margin-right: 8px; display: none;">User</span>
                <label class="theme-switch" title="Toggle Light/Dark Mode" style="margin-right: 12px;">
                    <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                    <span class="theme-slider"></span>
                </label>
                <button class="btn btn-secondary" onclick="window.location.href='home.html'">
                    🏠 Home
                </button>
            </div>
        </div>
    </div>

    <!-- Language Cycling Marquee -->
    <div id="langMarqueeMount"></div>

    <div class="container fadeInUp" style="padding-top: 40px;">
        <div class="flex-between mb-3">
            <div>
                <h1 style="font-size: 36px; margin-top: 16px;">🏆 Achievements</h1>
                <p class="text-muted">Unlock badges by completing challenges</p>
            </div>
            <div class="card" style="padding: 16px 24px;">
                <h3 style="color: var(--purple); margin-bottom: 4px;" id="unlockedCount">0</h3>
                <p class="text-muted" style="font-size: 14px;">Unlocked</p>
            </div>
        </div>

        <!-- Progress -->
        <div class="card mb-3">
            <div class="flex-between mb-2">
                <span>Overall Progress</span>
                <span id="progressText">0%</span>
            </div>
            <div class="xp-bar">
                <div id="progressBar" class="xp-fill" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Filter -->
        <div class="card mb-3">
            <div class="flex gap-2">
                <button class="btn btn-primary" onclick="filterAchievements('all')" id="filterAll">All</button>
                <button class="btn btn-secondary" onclick="filterAchievements('unlocked')"
                    id="filterUnlocked">Unlocked</button>
                <button class="btn btn-secondary" onclick="filterAchievements('locked')"
                    id="filterLocked">Locked</button>
            </div>
        </div>

        <!-- Achievements Grid -->
        <div id="achievementsGrid" class="grid-3">
            <!-- Achievements will load here -->
        </div>
    </div>

    <script src="app.js"></script>
    <script src="js/marquee.js"></script>
    <script src="js/achievements.js"></script>
</body>

</html>
