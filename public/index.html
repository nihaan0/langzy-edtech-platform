<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangZy - AI Language Learning</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="google-signin-client_id"
    content="172259298489-6nlmuej5ro7sva33f937d588c5j1gdmq.apps.googleusercontent.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
    <label class="theme-switch" title="Toggle Light/Dark Mode">
      <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
      <span class="theme-slider"></span>
    </label>
  </div>
  <div class="container flex-center" style="min-height: 100vh;">
    <div class="card" style="max-width: 500px; width: 100%;">
      <div class="text-center mb-3">
        <div style="display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 24px;">
          <img src="assets/logo.png" alt="LangZy Logo"
            style="width: 75px; height: 75px; object-fit: contain; border-radius: 50%; border: 3px solid rgba(52, 211, 153, 0.3); filter: drop-shadow(0 0 15px rgba(52, 211, 153, 0.2));">
          <h1
            style="margin: 0; background: linear-gradient(135deg, #34D399, #10B981); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 48px; font-weight: 900; letter-spacing: -1.5px;">
            LangZy
          </h1>
        </div>
        <p class="text-muted" style="font-size: 18px;">Master languages through AI conversation</p>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <h2 class="mb-2">Welcome Back!</h2>
        <form onsubmit="handleLogin(event)">
          <div class="mb-2">
            <input type="email" id="loginEmail" placeholder="Email" required>
          </div>
          <div class="mb-2">
            <input type="password" id="loginPassword" placeholder="Password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">
            Login
          </button>
        </form>

        <div class="divider mb-2 mt-2"><span>OR</span></div>
        <div class="social-login-container">
          <!-- Google Sign-In Button Container (official rendered button) -->
          <div id="googleBtnLogin" style="display:flex; justify-content:center; min-height:44px;"></div>
          <!-- Fallback custom button shown when google SDK isn't ready -->
          <button id="googleFallbackLogin" onclick="clickGoogleBtn('login')"
            style="width:100%; display:none; align-items:center; justify-content:center; gap:12px; padding:13px 20px; background:#fff; color:#3c4043; border:1.5px solid #dadce0; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.15);"
            onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.18)'; this.style.borderColor='#4285F4';"
            onmouseout="this.style.boxShadow='0 1px 4px rgba(0,0,0,0.15)'; this.style.borderColor='#dadce0';">
            <svg width="20" height="20" viewBox="0 0 48 48">
              <path fill="#FFC107"
                d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.8 6.5 29.1 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z" />
              <path fill="#FF3D00"
                d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.8 6.5 29.1 4 24 4c-7.7 0-14.3 4.4-17.7 10.7z" />
              <path fill="#4CAF50"
                d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.6-2.9-11.3-7l-6.5 5C9.7 39.5 16.4 44 24 44z" />
              <path fill="#1976D2"
                d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.6 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-4z" />
            </svg>
            Sign in with Google
          </button>
        </div>
        <p class="text-center mt-2 text-muted">
          Don't have an account?
          <a href="#" onclick="toggleForms(); return false;" style="color: var(--purple);">Sign up</a>
        </p>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" class="hidden">
        <h2 class="mb-2">Create Account</h2>
        <form onsubmit="handleSignup(event)">
          <div class="mb-2">
            <input type="text" id="signupName" placeholder="Full Name" required>
          </div>
          <div class="mb-2">
            <input type="email" id="signupEmail" placeholder="Email" required>
          </div>
          <div class="mb-2">
            <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required minlength="6">
          </div>
          <div class="mb-2">
            <select id="nativeLanguage">
              <option value="">Select your native language</option>
              <option value="English">English</option>
              <option value="Spanish">Spanish</option>
              <option value="French">French</option>
              <option value="German">German</option>
              <option value="Tamil">Tamil (தமிழ்)</option>
              <option value="Hindi">Hindi (हिन्दी)</option>
              <option value="Chinese">Chinese (中文)</option>
              <option value="Japanese">Japanese (日本語)</option>
              <option value="Korean">Korean (한국어)</option>
              <option value="Arabic">Arabic (العربية)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">
            Create Account
          </button>
        </form>

        <div class="divider mb-2 mt-2"><span>OR</span></div>
        <div class="social-login-container">
          <!-- Google Sign-Up Button Container (official rendered button) -->
          <div id="googleBtnSignup" style="display:flex; justify-content:center; min-height:44px;"></div>
          <!-- Fallback custom button shown when google SDK isn't ready -->
          <button id="googleFallbackSignup" onclick="clickGoogleBtn('signup')"
            style="width:100%; display:none; align-items:center; justify-content:center; gap:12px; padding:13px 20px; background:#fff; color:#3c4043; border:1.5px solid #dadce0; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.15);"
            onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.18)'; this.style.borderColor='#4285F4';"
            onmouseout="this.style.boxShadow='0 1px 4px rgba(0,0,0,0.15)'; this.style.borderColor='#dadce0';">
            <svg width="20" height="20" viewBox="0 0 48 48">
              <path fill="#FFC107"
                d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.8 6.5 29.1 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z" />
              <path fill="#FF3D00"
                d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.8 6.5 29.1 4 24 4c-7.7 0-14.3 4.4-17.7 10.7z" />
              <path fill="#4CAF50"
                d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.6-2.9-11.3-7l-6.5 5C9.7 39.5 16.4 44 24 44z" />
              <path fill="#1976D2"
                d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.6 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-4z" />
            </svg>
            Sign up with Google
          </button>
        </div>
        <p class="text-center mt-2 text-muted">
          Already have an account?
          <a href="#" onclick="toggleForms(); return false;" style="color: var(--purple);">Login</a>
        </p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function toggleForms() {
      document.getElementById('loginForm').classList.toggle('hidden');
      document.getElementById('signupForm').classList.toggle('hidden');
    }

    async function handleLogin(e) {
      e.preventDefault();
      showLoading();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const data = await apiCall('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        setToken(data.token);
        saveUser(data.user);
        showToast('Login successful! Welcome back 🎉', 'success');

        setTimeout(() => {
          window.location.href = 'home.html';
        }, 1000);
      } catch (error) {
        hideLoading();
        showToast(error.message || 'Login failed', 'error');
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      showLoading();

      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const nativeLanguage = document.getElementById('nativeLanguage').value;

      try {
        const data = await apiCall('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ name, email, password, nativeLanguage })
        });

        setToken(data.token);
        saveUser(data.user);
        showToast('Account created! Welcome to LangZy 🎉', 'success');
        triggerConfetti();

        setTimeout(() => {
          window.location.href = 'home.html';
        }, 1500);
      } catch (error) {
        hideLoading();
        showToast(error.message || 'Signup failed', 'error');
      }
    }

    // Social Login Handlers
    let googleInitialized = false;

    function showFallbackButtons() {
      // Show fallback buttons when Google SDK fails to load/initialize
      ['googleFallbackLogin', 'googleFallbackSignup'].forEach(id => {
        const btn = document.getElementById(id);
        if (btn) btn.style.display = 'flex';
      });
      ['googleBtnLogin', 'googleBtnSignup'].forEach(id => {
        const div = document.getElementById(id);
        if (div) div.style.display = 'none';
      });
    }

    const GOOGLE_CLIENT_ID = '172259298489-6nlmuej5ro7sva33f937d588c5j1gdmq.apps.googleusercontent.com';

    async function initGoogleSignIn() {
      try {
        if (typeof google === 'undefined' || !google.accounts) {
          console.warn('Google SDK not loaded, showing fallback');
          showFallbackButtons();
          return;
        }

        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleSocialCallback,
          auto_select: false,
          cancel_on_tap_outside: true,
          ux_mode: 'popup'
        });

        // Get the button container width for proper rendering
        const loginContainer = document.getElementById('googleBtnLogin');
        const btnWidth = Math.min(loginContainer ? loginContainer.offsetWidth || 440 : 440, 500);

        // Render official Google buttons directly
        google.accounts.id.renderButton(
          document.getElementById('googleBtnLogin'),
          { theme: 'outline', size: 'large', width: btnWidth, text: 'signin_with', logo_alignment: 'center' }
        );
        google.accounts.id.renderButton(
          document.getElementById('googleBtnSignup'),
          { theme: 'outline', size: 'large', width: btnWidth, text: 'signup_with', logo_alignment: 'center' }
        );

        googleInitialized = true;
        console.log('✅ Google Sign-In initialized successfully');
      } catch (err) {
        console.error('Google init error:', err);
        showFallbackButtons();
      }
    }

    function clickGoogleBtn(type) {
      // This is only called from the fallback button
      if (!googleInitialized) {
        initGoogleSignIn().then(() => {
          if (googleInitialized) {
            google.accounts.id.prompt();
          } else {
            showToast('Google Sign-In unavailable. Please check your network or try email login.', 'error');
          }
        });
        return;
      }
      google.accounts.id.prompt();
    }


    async function handleSocialCallback(response) {
      console.log('Google callback received:', response);
      if (!response || !response.credential) {
        showToast('Google sign-in cancelled or failed. Please try again.', 'error');
        return;
      }
      showLoading();
      try {
        let provider = response.isDemo ? 'demo' : 'google';
        console.log('Sending to backend with provider:', provider);

        const data = await apiCall('/auth/social', {
          method: 'POST',
          body: JSON.stringify({
            provider: provider,
            credential: response.credential,
            name: response.name // Pass the custom name for demo mode
          })
        });

        setToken(data.token);
        saveUser(data.user);
        showToast(`Login successful! Welcome ${data.user.name} 🎉`, 'success');

        setTimeout(() => {
          window.location.href = 'home.html';
        }, 1000);
      } catch (error) {
        hideLoading();
        console.error('Social login failed:', error);
        showToast(error.message || 'Google sign-in failed. Please try again.', 'error');
      }
    }

    // Auto-initialize Google Sign-In on page load
    window.addEventListener('load', () => {
      if (typeof google !== 'undefined') {
        initGoogleSignIn();
      } else {
        // Wait for Google script to load (max 5 seconds)
        let waited = 0;
        const interval = setInterval(() => {
          waited += 300;
          if (typeof google !== 'undefined') {
            clearInterval(interval);
            initGoogleSignIn();
          } else if (waited >= 5000) {
            clearInterval(interval);
            console.warn('Google SDK timeout - showing fallback buttons');
            showFallbackButtons();
          }
        }, 300);
      }
    });

    // Check if already logged in
    if (isAuthenticated()) {
      window.location.href = 'home.html';
    }
  </script>

  <style>
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }

      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }
  </style>
</body>

</html>
