<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary - LangZy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="flex-between mb-2" style="align-items: center; padding: 20px 0;">
            <div class="flex gap-2" style="align-items: center;">
                <button class="btn btn-secondary" onclick="window.history.back()" title="Go Back">
                    ← Back
                </button>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img src="assets/logo.png" alt="LangZy Logo"
                        style="width: 42px; height: 42px; object-fit: contain; border-radius: 50%; border: 2px solid var(--emerald-light);">
                    <h2
                        style="margin: 0; background: linear-gradient(135deg, #34D399, #10B981); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; font-weight: 800; letter-spacing: -1px;">
                        LangZy</h2>
                </div>
            </div>
            <div class="flex gap-2" style="align-items: center;">
                <span class="header-profile-name"
                    style="color: var(--text-main); font-weight: 600; margin-right: 8px; display: none;">User</span>
                <label class="theme-switch" title="Toggle Light/Dark Mode" style="margin-right: 12px;">
                    <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                    <span class="theme-slider"></span>
                </label>
                <button class="btn btn-secondary" onclick="window.location.href='home.html'">
                    🏠 Home
                </button>
            </div>
        </div>
    </div>

    <!-- Language Cycling Marquee -->
    <div id="langMarqueeMount"></div>

    <!-- Language Picker Modal -->
    <div id="vocabLangModal"
        style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,14,39,0.92);z-index:9999;overflow-y:auto;padding:40px 20px;">
        <div style="max-width:900px;margin:0 auto;">
            <div class="flex-between mb-3">
                <h2 style="font-size:28px;">🌍 Choose Language</h2>
                <button class="btn btn-secondary" onclick="closeVocabLangPicker()">✕ Close</button>
            </div>
            <div id="vocabLangGrid"
                style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;"></div>
        </div>
    </div>

    <div class="container" style="padding-top: 40px;">
        <div class="flex-between mb-3" style="flex-wrap:wrap;gap:12px;">
            <div>
                <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                    <h1 style="font-size: 36px; margin-top: 16px;">📚 Vocabulary</h1>
                    <button onclick="openVocabLangPicker()" class="btn btn-secondary"
                        style="margin-top:8px;padding:8px 16px;font-size:14px;border:2px solid var(--purple);background:rgba(124,58,237,0.15);">
                        🌍 Change Language
                    </button>
                </div>
                <p class="text-muted" id="languageName">Practice your words</p>
            </div>
            <div class="card" style="padding: 16px 24px;">
                <h3 style="color: var(--green); margin-bottom: 4px;" id="masteredCount">0</h3>
                <p class="text-muted" style="font-size: 14px;">Words Mastered</p>
            </div>
        </div>


        <!-- Filter Tabs -->
        <div class="card mb-3">
            <div class="flex gap-2">
                <button class="btn btn-primary" onclick="filterWords('all')" id="filterAll">All Words</button>
                <button class="btn btn-secondary" onclick="filterWords('learning')"
                    id="filterLearning">Learning</button>
                <button class="btn btn-secondary" onclick="filterWords('mastered')"
                    id="filterMastered">Mastered</button>
                <button class="btn btn-secondary" onclick="filterWords('review')" id="filterReview">Due for
                    Review</button>
            </div>
        </div>

        <!-- View Flashcards Link -->
        <div class="card mb-3 text-center" style="padding: 24px;">
            <h3 class="mb-2">🧠 Master your vocabulary</h3>
            <p class="text-muted mb-2">Practice these words with our specialized flashcard system.</p>
            <button class="btn btn-primary" onclick="window.location.href='flashcards.html'"
                style="font-size: 18px; padding: 12px 32px;">
                🃏 Practice with Flashcards
            </button>
        </div>

        <!-- Word Grid View -->
        <div id="wordGrid" class="grid-4">
            <!-- Words will load here -->
        </div>
    </div>

    <script src="app.js"></script>
    <script src="js/marquee.js"></script>
    <script src="js/vocabulary.js"></script>
</body>

</html>
