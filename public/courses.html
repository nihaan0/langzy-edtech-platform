<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - LangZy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="flex-between mb-2" style="align-items: center; padding: 20px 0;">
            <div class="flex gap-2" style="align-items: center;">
                <button class="btn btn-secondary" onclick="goBack()" title="Go Back">
                    ← Back
                </button>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img src="assets/logo.png" alt="LangZy Logo"
                        style="width: 42px; height: 42px; object-fit: contain; border-radius: 50%; border: 2px solid var(--emerald-light);">
                    <h2
                        style="margin: 0; background: linear-gradient(135deg, #34D399, #10B981); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; font-weight: 800; letter-spacing: -1px;">
                        LangZy</h2>
                </div>
            </div>
            <div class="flex gap-2" style="align-items: center;">
                <span class="header-profile-name"
                    style="color: var(--text-main); font-weight: 600; margin-right: 8px; display: none;">User</span>
                <label class="theme-switch" title="Toggle Light/Dark Mode" style="margin-right: 12px;">
                    <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                    <span class="theme-slider"></span>
                </label>
                <button class="btn btn-secondary" onclick="window.location.href='home.html'">
                    🏠 Home
                </button>
            </div>
        </div>
    </div>

    <!-- Language Cycling Marquee -->
    <div id="langMarqueeMount"></div>

    <!-- Language Picker Modal -->
    <div id="langPickerModal"
        style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,14,39,0.92);z-index:9999;overflow-y:auto;padding:40px 20px;">
        <div style="max-width:900px;margin:0 auto;">
            <div class="flex-between mb-3">
                <h2 style="font-size:28px;">🌍 Change Language</h2>
                <button class="btn btn-secondary" onclick="closeLangPicker()">✕ Close</button>
            </div>
            <div id="langPickerGrid"
                style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;"></div>
        </div>
    </div>

    <div class="container" style="padding-top: 40px;">
        <div class="flex-between mb-3" style="flex-wrap:wrap;gap:12px;">
            <div>
                <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                    <h1 id="courseTitle" style="font-size:32px;margin-bottom:4px;">📚 Courses</h1>
                    <button class="btn btn-secondary" onclick="openLangPicker()"
                        style="padding:8px 16px;font-size:14px;border:2px solid var(--purple);background:rgba(124,58,237,0.15);">
                        🌍 Change Language
                    </button>
                </div>
                <p class="text-muted" id="languageName">Loading...</p>
            </div>
            <div class="flex gap-2" style="flex-wrap:wrap;">
                <div class="streak-flame">
                    🔥 <span id="userStreak">0</span> day streak
                </div>
                <div class="card" style="padding: 12px 20px;">
                    ⭐ <span id="userXP">0</span> XP
                </div>
                <div class="card" style="padding: 12px 20px;">
                    <div class="hearts">
                        <span id="heartsDisplay">❤️❤️❤️❤️❤️</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Course Progress Overview -->
        <div class="card mb-3">
            <div class="grid-3">
                <div class="text-center">
                    <h3 style="color: var(--green); font-size: 32px; margin-bottom: 8px;" id="lessonsCompleted">0</h3>
                    <p class="text-muted">Lessons Completed</p>
                </div>
                <div class="text-center">
                    <h3 style="color: var(--purple); font-size: 32px; margin-bottom: 8px;" id="accuracyRate">0%</h3>
                    <p class="text-muted">Accuracy Rate</p>
                </div>
                <div class="text-center">
                    <h3 style="color: var(--orange); font-size: 32px; margin-bottom: 8px;" id="vocabularyCount">0</h3>
                    <p class="text-muted">Words Learned</p>
                </div>
            </div>
        </div>

        <!-- Beginner Course -->
        <div class="mb-3">
            <h2 class="mb-2" style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 40px;">🌱</span>
                <span>Beginner</span>
            </h2>
            <div id="beginnerLessons" class="grid-4"></div>
        </div>

        <!-- Intermediate Course -->
        <div class="mb-3">
            <h2 class="mb-2" style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 40px;">🚀</span>
                <span>Intermediate</span>
            </h2>
            <div id="intermediateLessons" class="grid-4"></div>
        </div>

        <!-- Advanced Course -->
        <div class="mb-3">
            <h2 class="mb-2" style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 40px;">⭐</span>
                <span>Advanced</span>
            </h2>
            <div id="advancedLessons" class="grid-4"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="js/marquee.js"></script>
    <script src="js/courses.js"></script>
</body>

</html>
