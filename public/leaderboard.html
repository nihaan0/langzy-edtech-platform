<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - LangZy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="flex-between mb-2" style="align-items: center; padding: 20px 0;">
            <div class="flex gap-2" style="align-items: center;">
                <button class="btn btn-secondary" onclick="window.history.back()" title="Go Back">
                    ← Back
                </button>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img src="assets/logo.png" alt="LangZy Logo"
                        style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--emerald-light);">
                    <h2
                        style="margin: 0; background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: -1px;">
                        LangZy</h2>
                </div>
            </div>
            <div class="flex gap-2" style="align-items: center;">
                <span class="header-profile-name"
                    style="color: var(--text-main); font-weight: 600; margin-right: 8px; display: none;">User</span>
                <label class="theme-switch" title="Toggle Light/Dark Mode" style="margin-right: 12px;">
                    <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                    <span class="theme-slider"></span>
                </label>
                <button class="btn btn-secondary" onclick="window.location.href='home.html'">
                    🏠 Home
                </button>
            </div>
        </div>
    </div>

    <!-- Language Cycling Marquee -->
    <div id="langMarqueeMount"></div>

    <div class="container fadeInUp" style="padding-top: 40px;">
        <div class="flex-between mb-3">
            <div>
                <h1 style="font-size: 36px; margin-top: 16px;">🏆 Leaderboard</h1>
                <p class="text-muted">Compete with language learners worldwide</p>
            </div>
        </div>
        <div class="card mb-3">
            <div class="flex gap-2">
                <button class="btn btn-primary" onclick="switchTab('weekly')" id="tabWeekly">This Week</button>
                <button class="btn btn-secondary" onclick="switchTab('monthly')">This Month</button>
                <button class="btn btn-secondary" onclick="switchTab('friends')">Friends</button>
                <button class="btn btn-secondary" onclick="switchTab('global')">Global</button>
            </div>
        </div>
        <div class="card mb-3"
            style="background: var(--gradient-primary); padding: 32px; border-radius: 24px; box-shadow: var(--shadow-glow);">
            <div class="flex-between">
                <div class="flex gap-3" style="align-items: center;">
                    <h2 style="font-size: 64px; font-weight: 900; color: white; text-shadow: 0 4px 8px rgba(0,0,0,0.3);"
                        id="userRank">#-</h2>
                    <div>
                        <h3 id="userName" style="font-size: 24px; font-weight: 800; color: white;">You</h3>
                        <p style="font-size: 18px; color: rgba(255,255,255,0.9);"><span id="userXP">0</span> XP
                            <small>(Total)</small>
                        </p>
                        <p style="font-size: 14px; color: rgba(255,255,255,0.7);"><span id="weeklyXP">0</span> XP
                            <small>(This Week)</small>
                        </p>
                        <div class="league-badge league-bronze" id="userLeague"
                            style="margin-top: 8px; display: inline-block;">Bronze League</div>
                    </div>
                </div>
                <div class="flex gap-3">
                    <div class="text-center"
                        style="background: rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 16px; backdrop-filter: blur(4px);">
                        <h3 style="color: white; font-size: 32px; font-weight: 800;" id="userStreak">0</h3>
                        <p style="color: rgba(255,255,255,0.8); font-size: 14px;">Day Streak</p>
                    </div>
                    <div class="text-center"
                        style="background: rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 16px; backdrop-filter: blur(4px);">
                        <h3 style="color: white; font-size: 32px; font-weight: 800;" id="userLevel">1</h3>
                        <p style="color: rgba(255,255,255,0.8); font-size: 14px;">Level</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <h2 class="mb-2">Rankings</h2>
            <div id="leaderboardList"></div>
        </div>
    </div>
    <script src="app.js"></script>
    <script src="js/marquee.js"></script>
    <script src="js/leaderboard.js"></script>
</body>

</html>
