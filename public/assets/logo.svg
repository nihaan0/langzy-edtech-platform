<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b2ff7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b24bf3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Circle Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" opacity="0.9"/>
  
  <!-- Brain/AI Icon -->
  <g transform="translate(100, 80)">
    <!-- Brain outline -->
    <path d="M -25,-20 Q -35,-25 -35,-15 Q -35,-5 -30,0 Q -35,5 -30,15 Q -25,20 -15,20 Q -10,25 0,25 Q 10,25 15,20 Q 25,20 30,15 Q 35,5 30,0 Q 35,-5 35,-15 Q 35,-25 25,-20 Q 15,-25 0,-25 Q -15,-25 -25,-20 Z" 
          fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>
    
    <!-- Circuit nodes -->
    <circle cx="-15" cy="-10" r="3" fill="#00d4ff"/>
    <circle cx="0" cy="-15" r="3" fill="#00d4ff"/>
    <circle cx="15" cy="-10" r="3" fill="#00d4ff"/>
    <circle cx="-10" cy="5" r="3" fill="#00d4ff"/>
    <circle cx="10" cy="5" r="3" fill="#00d4ff"/>
    
    <!-- Circuit lines -->
    <line x1="-15" y1="-10" x2="0" y2="-15" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="-15" x2="15" y2="-10" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-15" y1="-10" x2="-10" y2="5" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="-10" x2="10" y2="5" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="5" x2="10" y2="5" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Language symbols around -->
  <text x="40" y="50" font-family="Arial" font-size="16" fill="#00d4ff" opacity="0.7">A</text>
  <text x="150" y="60" font-family="Arial" font-size="16" fill="#00d4ff" opacity="0.7">あ</text>
  <text x="160" y="130" font-family="Arial" font-size="16" fill="#00d4ff" opacity="0.7">主</text>
  <text x="30" y="140" font-family="Arial" font-size="16" fill="#00d4ff" opacity="0.7">H</text>
  
  <!-- LangZy Text -->
  <text x="100" y="150" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" 
        fill="url(#textGradient)" text-anchor="middle">LangZy</text>
  
  <!-- Subtitle -->
  <text x="100" y="170" font-family="Arial" font-size="11" fill="#ffffff" 
        text-anchor="middle" opacity="0.8">AI Language Tutor</text>
</svg>
